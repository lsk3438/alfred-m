<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALFRED · Espace admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Rajdhani','Segoe UI',sans-serif;height:100%;overflow:hidden;color:#eaf2ff;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1100px 620px at 22% -10%,#11337f,transparent),radial-gradient(900px 640px at 120% 120%,#0a2a66,transparent),linear-gradient(135deg,#01040d 0%,#050f29 55%,#081a40 100%)}

  #net{position:fixed;inset:0;z-index:0;display:block}
  .glow{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;opacity:.35;pointer-events:none}
  .g1{width:520px;height:520px;top:-160px;left:-130px;background:radial-gradient(circle,rgba(56,135,255,.5),transparent 70%);animation:fl1 14s ease-in-out infinite}
  .g2{width:480px;height:480px;bottom:-160px;right:-130px;background:radial-gradient(circle,rgba(34,211,238,.4),transparent 70%);animation:fl2 16s ease-in-out infinite}

  .hud{position:fixed;z-index:5;pointer-events:none;color:rgba(140,190,255,.5);font-size:11px;letter-spacing:3px;font-weight:600}
  .hud.tl{top:18px;left:22px}.hud.br{bottom:16px;right:22px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#34d3ee;box-shadow:0 0 8px #34d3ee;animation:blink 1.6s ease-in-out infinite;vertical-align:middle;margin-right:7px}

  .center{position:relative;z-index:2;width:460px;max-width:92vw;text-align:center;transition:transform .18s ease-out}

  .brand{position:relative;display:inline-block;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:8px;font-size:58px;line-height:1;margin-left:8px}
  .brand span{display:inline-block;opacity:0;transform:translateY(34px) rotateX(-60deg);filter:blur(8px);
    background:linear-gradient(180deg,#f0f8ff,#82c8ff 52%,#4f7bff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:letterIn .75s cubic-bezier(.2,.8,.2,1) forwards}
  .brand::after{content:"";position:absolute;left:-25%;top:0;width:32%;height:100%;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);filter:blur(4px);
    transform:skewX(-18deg);opacity:0;animation:shine 3s ease-in-out 1.3s infinite}
  .divider{height:2px;width:0;margin:20px auto 0;border-radius:2px;background:linear-gradient(90deg,transparent,#38bdf8,#6366f1,transparent);
    animation:grow 1s ease-out 1s forwards;box-shadow:0 0 16px rgba(56,189,248,.7)}
  .acro{margin-top:16px;font-size:15px;font-weight:500;letter-spacing:1.5px;color:rgba(190,215,255,.62);opacity:0;animation:fade .9s ease-out 1.3s forwards;line-height:1.7}
  .acro b{color:#82c8ff;font-weight:700}
  .tagline{margin-top:7px;font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(150,190,255,.55);opacity:0;animation:fade .9s ease-out 1.6s forwards}

  .login{position:relative;margin:30px auto 0;width:368px;max-width:92vw;padding:28px 28px 22px;border-radius:22px;text-align:left;
    background:rgba(7,15,36,.62);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    box-shadow:0 30px 80px rgba(0,8,40,.55),inset 0 1px 0 rgba(255,255,255,.12);opacity:0;animation:rise 1s ease-out 1.5s both}
  /* halo doux qui respire */
  .login .halo{position:absolute;inset:-14px;border-radius:30px;z-index:-1;pointer-events:none;
    background:radial-gradient(60% 60% at 50% 40%,rgba(56,140,255,.30),transparent 70%);
    filter:blur(14px);animation:breathe 4.5s ease-in-out infinite}
  /* bord fin permanent */
  .login::before{content:"";position:absolute;inset:-1px;border-radius:23px;padding:1px;
    background:linear-gradient(180deg,rgba(130,185,255,.40),rgba(99,102,241,.14));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
  /* comète lumineuse qui glisse le long du bord */
  .login::after{content:"";position:absolute;inset:-1.5px;border-radius:23px;padding:1.5px;
    background:conic-gradient(from 0deg,transparent 0 70%,rgba(56,189,248,.15) 74%,#38bdf8 84%,#bdeeff 90%,#38bdf8 95%,transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    filter:drop-shadow(0 0 6px rgba(90,200,255,.9));animation:spin 4.5s linear infinite}
  .field{position:relative;margin-top:14px}
  .field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-style:normal;font-size:16px;opacity:.7}
  .field input{width:100%;padding:13px 14px 13px 42px;border-radius:13px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:500;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(150,190,255,.28);outline:none;transition:.2s}
  .field input::placeholder{color:rgba(220,232,255,.5)}
  .field input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.25);background:rgba(255,255,255,.1)}
  .btn{position:relative;overflow:hidden;width:100%;margin-top:20px;padding:14px;border:none;cursor:pointer;border-radius:13px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:#02122e;background:linear-gradient(90deg,#38bdf8,#6366f1);box-shadow:0 12px 30px rgba(59,130,246,.5);transition:transform .15s}
  .btn:hover{transform:translateY(-2px)}
  .btn .sh{position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.6) 50%,transparent 70%);background-size:200% 100%;animation:shineb 2.4s linear infinite}
  .secure{text-align:center;margin-top:13px;font-size:12.5px;font-weight:500;color:rgba(190,215,255,.6)}
  .err{text-align:center;margin-top:12px;font-size:13px;font-weight:600;color:#ff9aa2;min-height:18px}

  @keyframes letterIn{to{opacity:1;transform:none;filter:blur(0)}}
  @keyframes shine{0%{left:-25%;opacity:0}20%{opacity:1}60%{left:120%;opacity:0}100%{left:120%;opacity:0}}
  @keyframes grow{to{width:240px}}
  @keyframes fade{to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
  @keyframes breathe{0%,100%{opacity:.55;transform:scale(.97)}50%{opacity:1;transform:scale(1.03)}}
  @keyframes fl1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,28px)}}
  @keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-26px)}}
  @keyframes shineb{to{background-position:200% 0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @media(max-width:520px){.brand{font-size:40px;letter-spacing:5px}}
</style>
</head>
<body>
  <canvas id="net"></canvas>
  <div class="glow g1"></div><div class="glow g2"></div>
  <div class="hud tl"><span class="dot"></span>SYSTÈME EN LIGNE</div>
  <div class="hud br">GENIUS · COSMOPOLITAN COLOURS</div>

  <div class="center" id="center">
    <div class="brand" id="brand"></div>
    <div class="divider"></div>
    <div class="acro"><b>A</b>utonomous <b>L</b>odging <b>F</b>ramework for <b>R</b>ental &amp; <b>E</b>xperience <b>D</b>elivery</div>
    <div class="tagline">Espace administrateur</div>

    <form class="login" id="loginForm" onsubmit="return false">
      <div class="halo"></div>
      <div class="field"><i>👤</i><input id="u" type="text" placeholder="Identifiant" autocomplete="username"></div>
      <div class="field"><i>🔒</i><input id="p" type="password" placeholder="Mot de passe" autocomplete="current-password"></div>
      <button class="btn" id="loginBtn" type="submit">SE CONNECTER →<span class="sh"></span></button>
      <div class="err" id="err"></div>
      <div class="secure">🛡️ Connexion chiffrée · HTTPS</div>
    </form>
  </div>

<script>
  // --- Lettres ALFRED ---
  var word='ALFRED',b=document.getElementById('brand');
  for(var i=0;i<word.length;i++){var s=document.createElement('span');s.textContent=word[i];s.style.animationDelay=(0.15+i*0.1)+'s';b.appendChild(s);}

  // --- Connexion ---
  var form=document.getElementById('loginForm'),errEl=document.getElementById('err');
  function doLogin(){
    var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value.trim();
    errEl.textContent='';
    if(!u||!p){errEl.textContent='Entre ton identifiant et ton mot de passe.';return;}
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user:u,pass:p})})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
      .then(function(res){if(res.ok&&res.j.ok){location.href='/dashboard';}
        else{errEl.textContent=res.j.error||'Connexion refusée.';}})
      .catch(function(){errEl.textContent="Serveur injoignable (page ouverte hors serveur ?).";});
  }
  form.addEventListener('submit',doLogin);

  // --- Réseau d'étoiles connectées + scintillement + étoiles filantes ---
  var cvs=document.getElementById('net'),ctx=cvs.getContext('2d'),W,H,parts=[],shoot=[];
  function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;}
  resize();addEventListener('resize',resize);
  var N=Math.min(120,Math.floor(innerWidth*innerHeight/14000));
  for(var k=0;k<N;k++)parts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.7+.6,ph:Math.random()*6.28,tw:Math.random()*.04+.01});
  var mouse={x:-999,y:-999};
  addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;
    var c=document.getElementById('center'),dx=(e.clientX/innerWidth-.5),dy=(e.clientY/innerHeight-.5);
    c.style.transform='translate('+(dx*18)+'px,'+(dy*14)+'px)';});
  addEventListener('mouseleave',function(){mouse.x=mouse.y=-999;document.getElementById('center').style.transform='';});

  function maybeShoot(){if(Math.random()<0.004&&shoot.length<2){var sy=Math.random()*H*.5;
    shoot.push({x:-50,y:sy,vx:8+Math.random()*5,vy:2+Math.random()*2,life:1});}}

  function loop(){
    ctx.clearRect(0,0,W,H);
    for(var p,i=0;i<parts.length;i++){p=parts[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;}
    ctx.shadowBlur=0;
    for(var a,c,i=0;i<parts.length;i++){a=parts[i];
      for(var j=i+1;j<parts.length;j++){c=parts[j];var dx=a.x-c.x,dy=a.y-c.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<128){ctx.strokeStyle='rgba(95,170,255,'+(1-d/128)*0.30+')';ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(c.x,c.y);ctx.stroke();}}
      var mx=a.x-mouse.x,my=a.y-mouse.y,md=Math.sqrt(mx*mx+my*my);
      if(md<200){ctx.strokeStyle='rgba(80,220,255,'+(1-md/200)*0.7+')';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();}}
    ctx.shadowColor='rgba(120,200,255,.9)';ctx.shadowBlur=7;
    for(var p,i=0;i<parts.length;i++){p=parts[i];p.ph+=p.tw;var al=.55+Math.sin(p.ph)*.4;
      ctx.fillStyle='rgba(170,210,255,'+al+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.2832);ctx.fill();}
    if(mouse.x>0){ctx.fillStyle='rgba(90,220,255,.9)';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(mouse.x,mouse.y,2.4,0,6.2832);ctx.fill();}
    ctx.shadowBlur=0;maybeShoot();
    for(var s,i=shoot.length-1;i>=0;i--){s=shoot[i];s.x+=s.vx;s.y+=s.vy;s.life-=.012;
      var g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*9,s.y-s.vy*9);
      g.addColorStop(0,'rgba(180,230,255,'+s.life+')');g.addColorStop(1,'rgba(180,230,255,0)');
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*9,s.y-s.vy*9);ctx.stroke();
      if(s.life<=0||s.x>W+60)shoot.splice(i,1);}
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
